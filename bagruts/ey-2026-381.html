<drill lang="java" id="sort()">
public static void $sort$(int[] a) {
        ^what ~g ht func-name                   {1}
    for (int i = 0; i < arr.length$$; i++) {    {2}
            ^() ~r ht length-is-prop
        int k = i;
        for (int j = i + 1; j < arr.length$$; j++) {    {2}
                ^() ~r ht length-is-prop
            if (a[j] > a[k]) {
                k = j;
            }
        }
        if (k != i) {
            a[i] += a[k];
            a[k] = a[i] - a[k];
            a[i] = a[i] - a[k];
        }
    }
}

<drill lang="java" id="zigZagNumber()" todo skip>
public static boolean zigZagNumber(int num) {
    int l = 0;
    int m = num % 10;
    num /= 10;
    int r = num % 10;
    num /= 10;
    while (num >= 100) {
        l = m;
        m = r;
        r = num % 10;
        num /= 10;
        boolean min = m < l && m < r;
        boolean max = m > l && m > r;
        if (!min && !max) {
            return false;
        }
    }
    return true;
}

print(zigZagNumber(1213141516));    // true
print(zigZagNumber(51535450));      // true
print(zigZagNumber(254342474));     // false
</drill>

// Last digits (a,b,c) of each trio: a * b = c 
public static boolean oneTwoThree(int[] arr) {
    if (arr.length < 3) {
        return false;
    }
    for (int i = 2; i < arr.length; i++) {
        int a = arr[i-2];
        int b = arr[i-1];
        int c = arr[i];
        if (a % 10 * (b % 10) % 10 != c % 10) {
            return false;
        }
        if (a * b % 10 != c % 10) {
            return false;
        }
    }
    return true;
}

print(oneTwoThree(new int[] {2,3,6,38,58,24,22}));  // true
print(oneTwoThree(new int[] {2,3,6,39,58,24,22}));  // false

<drill lang="java" id="countQuestions()" no-wrong-phase>
class Answer {
    private int question;
    private int answer;
}

    private Answer[] answers;

// [2,1, 3,4, 4,3, 5,4, 6,1, 7,4, 8,3]

public static int countQuestions(Student[] exam) {
    int maxNumber = 0;
    for ($int i = 0; i < exam.length; i++$) {
            ^... ~o ht implement
        Answer[] answers = $exam[i].getAnswers();$
            ^... ~o ht implement
        for ($int j = 0; j < answers.length; j++$) {
                ^... ~o ht implement
            int q = $answers[j].getQuestion();$
                ^... ~o ht implement
            if (q > maxNumber) {
                maxNumber = q;
            }
        }
    }

}

public static int answersToHardestQ(Student[] exam,
                                    int[] rightAnswers)
{
    int numOfQuestions = countQuestions(exam);
-    // המערך מאופס אוטומטית                            {1}
    int[] rightCounts = new int[$numOfQuestions + 1$];      {1}
        ^... ~o ht implement

    for ($int i = 0; i < exam.length; i++$) {
            ^... ~o ht implement
        Answer[] answers = $exam[i].getAnswers();$
            ^... ~o ht implement
        for ($int j = 0; j < answers.length; j++$) {
                ^... ~o ht implement
            int question = $answers[j].getQuestion();$
                ^... ~o ht implement
            int answer = $answers[j].getAnswer();$
                ^... ~o ht implement
            if (answer == $rightAnswers[question]$) {
                    ^... ~o ht implement
                $rightCounts[question]++;$
                    ^... ~o ht implement
            }
        }
    }

    int hardest = 1;
    for (int i = $2$; i < rightCounts.length; i++) {
            ~g ht למה דווקה 2?
        if (rightCounts[i] < rightCounts[hardest]) {
            hardest = i;
        }
    }

    System.out.println("hardest question is: " + hardest);
    return $rightCounts[hardest];$
        ^... ~o ht implement
}
