    public int sumOfSmallestNumbers(int count) {
        int sum = 0;
        while (count > 0) {
            int min = findMin();    // find current smallest

public static maxConnect(int[] a, int[] b) {
    int m = 1;
    while (m < a.length) {
        if (!isMConnect(a, b, m)) {
            return m - 1;
        }
        m++;
    }
    return m;
}
