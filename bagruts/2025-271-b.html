// The last M numbers of a[] are first M numbers of b[]
public static boolean isMConnect(int[] a, int[] b, int m) {
    int k = $a.length - m;$
            ^... ~o hr implement
    for (int i = 0; i < m; i++) {
        if (a[i + k] != b[i]) {
            return $false;$
                ^... ~o hr implement
        }
    }
    return $true;$
        ^... ~o hr implement
}

<drill lang="java" id="queue-solution" tags="['q-2','solution']" no-wrong-phase>
public static boolean isMConnect(Queue&lt;Integer> a, Queue&lt;Integer> b, int m) {
    int k = $length(a) - m;$
        ^... ~o hr implement
    for (int i = 0; i < m; i++) {
        if ($atIndex(a, i + k)$ != $atIndex(b, i)$) {
                ^... ~o hr implement
                ^... ~o hr implement        {+}
            return false;
        }
    }
    return true;
}

public static int maxConnect(Queue&lt;Integer> a, Queue&lt;Integer> b) {
    int max = 0;
    for (int i = 0; i < $length(a)$; i++) {
            ^... ~o hr implement
        if (isMConnect(a, b, i)) {
            max = i;
        }
    }
    return max;
}

Queue&lt;Integer> a = queueFromArray(new Integer[] {2,5,4,4,7,2,6});
Queue&lt;Integer> b = queueFromArray(new Integer[] {2,6,7,1,4,2,1,8,1});

print(isMConnect(a, b, 2));     // true
print(maxConnect(a, b));        // 2
print(maxConnect(b, a));        // 0

<drill lang="java" id="sod() and secret()" tags="['q-'3,'idea-3']" skip no-wrong-phase>
public static boolean $contains$(BinNode&lt;Integer> root, int num) {       {1}
        ^sod ~g ht func-name
    if (root == null)
        return false;
    if (root.getValue() == num)
        return true;
    return $contains$(root.getLeft(), num) || $contains$(root.getRight(), num);     {1}
        ^sod ~g ht func-name
        ^sod ~g ht func-name
}

-// עם יש לי איקס בתור בן תכליל אותי בסכום  {2}
public static int $sumIfxIsChild$(BinNode&lt;Integer> root, int x) {            {2}
        ^secret ~g ht func-name
    if (!$contains$(root, x))       {1}
            ^sod ~g ht func-name
        return 0;
    if ((root.getLeft() != null && root.getLeft().getValue() == x) || 
        (root.getRight() != null && root.getRight().getValue() == x))
    {
        return root.getValue() + $sumIfxIsChild$(root.getLeft(), x) +
                                    ^secret ~g ht func-name             {2}
                                 $sumIfxIsChild$(root.getRight(), x);
                                    ^secret ~g ht func-name             {2}
    }
    return $sumIfxIsChild$(root.getLeft(), x) + $sumIfxIsChild$(root.getRight(), x);    {2}
        ^secret ~g ht func-name
        ^secret ~g ht func-name
}
</drill>
