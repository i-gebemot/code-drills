<drill lang="java" id="isMConnect()" tags="['q-2','idea-1']" no-wrong-phase>
// first m numbers of a[] are last number of b[]
public static boolean isMConnect(int[] a, int[] b, int m) {
    int k = $a.length - m;$
            ^... ~o hr implement
    for (int i = 0; i < m; i++) {
        if (a[i + k] != b[i]) {
            return $false;$
                ^... ~o hr implement
        }
    }
    return $true;$
        ^... ~o hr implement
}

int[] a = new int[] {2,5,4,4,7,2,6};
int[] b = new int[] {2,6,7,1,4,2,1,8,1};
print(isMConnect(a, b, 2));

// Runtime complexity of isMConnect() is  $`O(n)`$
    ^? ~g hr result
</drill>

<drill lang="java" id="maxConnect()" tags="['q-2','idea-3']" no-wrong-phase>
public static int maxConnect(int[] a, int[] b) {
    int max = $0;$
        ^... ~o hr implement
    for ($int i = 0; i < a.length; i++$) {
            ^... ~o hr implement
        if ($isMConnect(a, b, i)$) {
                ^... ~o hr implement
            max = i;
        }
    }
    return max;
}

int[] a = new int[] {2,5,4,4,7,2,6};
int[] b = new int[] {2,6,7,1,4,2,1,8,1};

print(maxConnect(a, b));            // $2$
    ^? ~g hr result
print(maxConnect(b, a));            // $0$
    ^? ~g hr result

// Runtime complexity of maxConnect is  $`O(n^2)`$
    ^? ~g hr result
</drill>

<drill lang="java" id="sod() and secret()" tags="['q-'3,'idea-3']" no-wrong-phase>
public static boolean $contains$(BinNode&lt;Integer> root, int num) {       {1}
        ^sod ~g ht func-name
    if (root == null)
        return false;
    if (root.getValue() == num)
        return true;
    return $contains$(root.getLeft(), num) || $contains$(root.getRight(), num);     {1}
        ^sod ~g ht func-name
        ^sod ~g ht func-name
}

-// עם יש לי איקס בתור בן תכליל אותי בסכום  {2}
public static int $sumIfxIsChild$(BinNode&lt;Integer> root, int x) {            {2}
        ^secret ~g ht func-name
    if (!$contains$(root, x))       {1}
            ^sod ~g ht func-name
        return 0;
    if ((root.getLeft() != null && root.getLeft().getValue() == x) || 
        (root.getRight() != null && root.getRight().getValue() == x))
    {
        return root.getValue() + $sumIfxIsChild$(root.getLeft(), x) +
                                    ^secret ~g ht func-name             {2}
                                 $sumIfxIsChild$(root.getRight(), x);
                                    ^secret ~g ht func-name             {2}
    }
    return $sumIfxIsChild$(root.getLeft(), x) + $sumIfxIsChild$(root.getRight(), x);    {2}
        ^secret ~g ht func-name
        ^secret ~g ht func-name
}
</drill>
