<drill lang="java" id="twoSum()">
$!html <img src="./img/demo-271-q-1.png"><br>
public static boolean twoSum(int[] a, int x) {
    for (int i = 0; i < a.length; i++) {
        for (int j = i+1; j < a.length; j++) {
            if (a[i] + a[j] == x) {
                return true;
            }
        }
    }
    return false;
}
// Runtime complexity: $`O(n^2)`$
    ^? ~g ht result

public static boolean twoSum($Queue&lt;Integer> q$, int x) {   {1}
        ^int[] a ~g
    for (int i = 0; i < $len(q)$; i++) {                    {1}
            ^a.lenght ~g
        for (int j = i+1; j < $len(q)$; j++) {              {1}
                ^a.lenght ~g
            if ($at(q,i)$ + $at(q,j)$ == x) {               {1}
                    ^a[i] ~g
                    ^a[j] ~g
                return true;
            }
        }
    }
    return false;
}
// Runtime complexity: $`O(n^3)`$                           {1}
    ^`O(n^3)` ~t ~m
</drill>

public static boolean isPrime(int num) {
    for (int $i = 2$; i < num; i++) {
            ~g ht למה דווקה 2?
        if (num % i == 0) {
            return $false;$
                ^... ~o ht implement
        }
    }
    return $true;$
        ^... ~o ht implement
}

public static int factorOf(int num) {
    for (int i = $2$; i < num; i++) {
            ^... $ ~o ht implement
        if (num % i $== 0$) {
                ^... ~o ht implement
            return $i;$
                ^... ~o ht implement
        }
    }
    return $num;$
        ^...$ ~o ht implement

<drill lang="java" id="q-3-a" no-wrong-phase>
$!html <img src="./img/demo-271-q-3-a.png">
public static boolean addNodes(BinNode&lt;Integer> tr) {
    int num = tr.getValue();
    if (isPrime(num)) {
        return false;
    }
    int f1 = factorOf(num);
    int f2 = $num / f1;$
        ^...$ ~o ht implement
    tr.setLeft($new BinNode&lt;Integer>(f1)$);
        ^...$ ~o ht implement
    tr.setRight($new BinNode&lt;Integer>(f2)$);
        ^...$ ~o ht implement
    return true;
}
</drill>
